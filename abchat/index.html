<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — ABChat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#fafaf9; --surface:#fff; --border:#e5e5e0; --text:#1c1917; --text-secondary:#57534e; --text-muted:#a8a29e; --green:#15803d; --mono:'IBM Plex Mono',monospace; --radius:3px; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--text);line-height:1.7;font-size:14px}
.header{background:var(--surface);border-bottom:2px solid var(--text);padding:2rem 0 1.75rem}
.container{max-width:860px;margin:0 auto;padding:0 2rem}
.brand{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem}
.brand a{color:var(--text-muted);text-decoration:none}
.title{font-size:1.3rem;font-weight:700;margin-bottom:.35rem}
.subtitle{font-size:.82rem;color:var(--text-secondary)}
.reports{padding:2rem 0}
.report-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:var(--text);transition:border-color .15s}
.report-item:hover{border-color:var(--text)}
.report-date{font-size:.7rem;color:var(--text-muted);margin-bottom:.25rem}
.report-title{font-weight:600;font-size:.85rem}
.report-score{font-size:1.1rem;font-weight:700;color:var(--green)}
.footer{border-top:1px solid var(--border);padding:1.5rem 0;margin-top:2rem}
.footer-text{font-size:.65rem;color:var(--text-muted);text-align:center}
</style>
</head>
<body>
<div class="header">
<div class="container">
    <div class="brand"><a href="/dashboard/">RADAR</a> / ABChat</div>
    <div class="title">ABChat</div>
    <div class="subtitle">abchat.it — Agentic Brain Chat platform</div>
</div>
</div>
<div class="container">
<div class="reports">
    <a href="2026-03-11-generations-500-permission-fix/" class="report-item">
        <div>
            <div class="report-date">11 marzo 2026</div>
            <div class="report-title">Generations 500 — Permessi storage/database dopo isolation deploy</div>
        </div>
        <div class="report-score">100</div>
    </a>
    <a href="2026-03-10-brain-isolation-e2e/" class="report-item">
        <div>
            <div class="report-date">10 marzo 2026</div>
            <div class="report-title">Brain Isolation E2E — Playwright full flow</div>
        </div>
        <div class="report-score">10/10</div>
    </a>
    <a href="2026-03-04-postfix-refreshdb-incident/" class="report-item">
        <div>
            <div class="report-date">4 marzo 2026</div>
            <div class="report-title">Post-fix: Incident RefreshDatabase</div>
        </div>
        <div class="report-score">90</div>
    </a>
</div>
</div>
<div class="footer"><div class="container"><div class="footer-text">Radar / giobi.com</div></div></div>
</body>
</html>
