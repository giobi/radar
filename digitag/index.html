<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar — digitag.me</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Mono', monospace; background: #fafaf9; color: #1c1917; font-size: 13px; line-height: 1.6; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 20px; }
    .header { background: #1c1917; color: #fff; padding: 16px 0; }
    .header .container { display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 14px; font-weight: 700; letter-spacing: .04em; }
    .back { font-size: 11px; color: rgba(255,255,255,.5); text-decoration: none; }
    .back:hover { color: #fff; }
    .title { padding: 32px 0 16px; }
    .title h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .title p { font-size: 11px; color: #78716c; }
    .reports { display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
    .report-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: #fff; border: 1px solid #e5e5e0; border-radius: 3px; text-decoration: none; color: #1c1917; transition: border-color .15s; }
    .report-row:hover { border-color: #1c1917; }
    .score-chip { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 3px; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .score-red { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .score-yellow { background: #fefce8; color: #a16207; border: 1px solid #fde68a; }
    .score-green { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .report-info { flex: 1; }
    .report-title { font-size: 13px; font-weight: 600; }
    .report-meta { font-size: 10px; color: #78716c; margin-top: 2px; }
    .arrow { color: #78716c; font-size: 16px; }
  </style>
</head>
<body>
<div class="header">
  <div class="container">
    <div class="brand">RADAR — digitag.me</div>
    <a href="/dashboard/" class="back">← Dashboard</a>
  </div>
</div>
<div class="container">
  <div class="title">
    <h1>digitag.me</h1>
    <p>2 report &nbsp;·&nbsp; Ultimo: 12 maggio 2026</p>
  </div>
  <div class="reports">
    <a href="2026-05-12-seo-audit/" class="report-row">
      <div class="score-chip score-red">48</div>
      <div class="report-info">
        <div class="report-title">Audit tecnico SEO</div>
        <div class="report-meta">12 maggio 2026 &nbsp;·&nbsp; og:image, sitemap, lingua mista, schema.org</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a href="2026-02-27-full-check/" class="report-row">
      <div class="score-chip score-yellow">72</div>
      <div class="report-info">
        <div class="report-title">Full check</div>
        <div class="report-meta">27 febbraio 2026</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
</div>
</body>
</html>
