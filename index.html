<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>404 — Radar</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9; --surface: #ffffff;
    --text: #1c1917; --text-muted: #a8a29e;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.wrap { text-align: center; padding: 2rem; }
.code { font-size: 6rem; font-weight: 700; letter-spacing: -.04em; line-height: 1; color: var(--text); }
.radar-icon { margin: 1.5rem 0; }
.radar-icon svg { width: 48px; height: 48px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; animation: spin 8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.msg { font-size: .82rem; color: var(--text-muted); margin-top: .5rem; line-height: 1.6; }
.msg a { color: var(--text-muted); text-decoration: underline; text-underline-offset: 3px; }
.msg a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
    <div class="code">404</div>
    <div class="radar-icon">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
    </div>
    <div class="msg">Niente da vedere qui.<br>Se hai un link a un report, usalo direttamente.</div>
</div>
</body>
</html>
