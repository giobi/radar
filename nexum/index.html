<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — Nexum</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fafaf9; --surface: #ffffff;
    --border: #e5e5e0; --border-strong: #d0d0c8;
    --green: #15803d; --yellow: #854d0e; --red: #b91c1c;
    --text: #1c1917; --text-secondary: #57534e; --text-muted: #a8a29e;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', 'Consolas', monospace;
    --radius: 3px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--mono); background: var(--bg); color: var(--text); line-height:1.65; font-size:14px; }

.gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.gate-box { width: 320px; }
.gate-box h1 { font-size: .75rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: .5rem; }
.gate-box h1 svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
.gate-input { width: 100%; padding: .6rem .75rem; border: 2px solid var(--border-strong); border-radius: var(--radius); font-family: var(--mono); font-size: .85rem; background: var(--surface); color: var(--text); outline: none; }
.gate-input:focus { border-color: var(--text); }
.gate-input::placeholder { color: var(--text-muted); }
.gate-error { font-size: .72rem; color: var(--red); margin-top: .5rem; display: none; }

.content { display: none; }

header { background: var(--surface); border-bottom: 2px solid var(--text); padding: 2rem 0 1.75rem; }
.container { max-width: 860px; margin:0 auto; padding:0 2rem; }
.brand { font-size: .65rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: .75rem; display: flex; align-items: center; gap: .5rem; }
.brand svg { width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
.brand a { color: var(--text-muted); text-decoration: none; }
h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.01em; }
.project-url { font-size: .78rem; color: var(--text-muted); margin-top: .2rem; }
main { padding: 2rem 0 4rem; }

.report-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); }
.report-row:first-child { border-top: 1px solid var(--border); }
.report-row:hover { background: rgba(0,0,0,.015); }
.report-title { font-weight: 600; font-size: .82rem; }
.report-date { font-size: .7rem; color: var(--text-muted); margin-top: .1rem; }
.report-score { font-size: 1rem; font-weight: 700; }
.report-verdict { font-size: .6rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-top: .1rem; }

footer { border-top: 2px solid var(--text); padding: 1.25rem 0; }
footer p { font-size: .68rem; color: var(--text-muted); display: flex; justify-content: space-between; }
footer a { color: var(--text-secondary); text-decoration: none; }
</style>
</head>
<body>

<div class="gate" id="gate">
<div class="gate-box">
    <h1><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="4"/></svg>Radar</h1>
    <input class="gate-input" id="gate-pw" type="password" placeholder="Codice accesso" autocomplete="off" autofocus>
    <div class="gate-error" id="gate-err">Codice non valido</div>
</div>
</div>

<div class="content" id="content">
<header>
<div class="container">
    <div class="brand"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/><line x1="12" y1="2" x2="12" y2="4"/></svg><a href="../">Radar</a></div>
    <h1>Nexum</h1>
    <p class="project-url">nexum.it &middot; estendo.sel.re</p>
</div>
</header>
<main>
<div class="container">
    <a class="report-row" href="2026-02-27-payment-debug/">
        <div>
            <div class="report-title">Pagamento carta di credito</div>
            <div class="report-date">27 febbraio 2026 &middot; Bug fix &middot; 3 iterazioni</div>
        </div>
        <div style="text-align:right;">
            <div class="report-score" style="color:var(--green);">100</div>
            <div class="report-verdict" style="color:var(--green);">fixed</div>
        </div>
    </a>
</div>
</main>
<footer><div class="container"><p><span>Radar &middot; <a href="../">Tutti i progetti</a></span><span><a href="https://giobi.com">giobi.com</a></span></p></div></footer>
</div>

<script>
(function(){
    var K='radar2026';
    var g=document.getElementById('gate');
    var c=document.getElementById('content');
    var i=document.getElementById('gate-pw');
    var e=document.getElementById('gate-err');
    if(sessionStorage.getItem('radar-auth')==='1'){g.style.display='none';c.style.display='block';return;}
    i.addEventListener('keydown',function(ev){
        if(ev.key==='Enter'){
            if(i.value===K){
                sessionStorage.getItem('radar-auth','1');
                g.style.display='none';
                c.style.display='block';
            } else {
                e.style.display='block';
                i.value='';
                i.focus();
            }
        }
    });
})();
</script>
</body>
</html>
