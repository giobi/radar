<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar — Nexum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
    --accent: #6366f1; --green: #16a34a; --yellow: #ca8a04; --red: #dc2626;
    --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
    --font: 'Inter', -apple-system, sans-serif;
    --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height:1.7; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 2rem 0; }
.container { max-width: 860px; margin:0 auto; padding:0 1.5rem; }
.brand { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
.brand-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
.brand a { font-size: .75rem; font-weight: 600; color: var(--accent); text-decoration: none; letter-spacing: .04em; text-transform: uppercase; }
h1 { font-size: 1.4rem; font-weight: 700; }
.project-url { font-size: .85rem; color: var(--text-secondary); }
main { padding: 2rem 0 4rem; }
.report-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: .75rem; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: var(--text); transition: all .15s; }
.report-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(99,102,241,.08); }
.report-title { font-weight: 600; font-size: .95rem; margin-bottom: .15rem; }
.report-date { font-size: .78rem; color: var(--text-muted); }
.badge { display: inline-block; padding: .15rem .5rem; border-radius: 4px; font-size: .7rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
.badge-green { background: rgba(22,163,74,.08); color: var(--green); }
.badge-yellow { background: rgba(202,138,4,.08); color: var(--yellow); }
.score { font-size: 1.1rem; font-weight: 700; }
.footer { border-top: 1px solid var(--border); padding: 1.5rem 0; }
.footer p { font-size: .75rem; color: var(--text-muted); display: flex; justify-content: space-between; }
.footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="header">
<div class="container">
    <div class="brand">
        <div class="brand-icon">📡</div>
        <a href="../">Radar</a>
    </div>
    <h1>Nexum</h1>
    <p class="project-url">nexum.it · estendo.sel.re</p>
</div>
</div>
<main>
<div class="container">
    <a class="report-card" href="2026-02-27-payment-debug/">
        <div>
            <div class="report-title">Pagamento carta di credito</div>
            <div class="report-date">27 febbraio 2026 · Bug fix · 3 iterazioni</div>
        </div>
        <div style="text-align:right;">
            <div class="score" style="color:var(--green);">100</div>
            <span class="badge badge-green">FIXED</span>
        </div>
    </a>
</div>
</main>
<div class="footer"><div class="container"><p><span>Radar · <a href="../">Tutti i progetti</a></span><span><a href="https://giobi.com">giobi.com</a></span></p></div></div>
</body>
</html>
