<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — pessano.it</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#fafaf9;--surface:#fff;--border:#e5e5e0;--text:#1c1917;--text-secondary:#57534e;--text-muted:#a8a29e;--mono:'IBM Plex Mono','SFMono-Regular',monospace;--radius:3px;--yellow:#854d0e;--yellow-bg:rgba(133,77,14,.06); }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--text);line-height:1.7;font-size:14px}
.container{max-width:1080px;margin:0 auto;padding:2rem 2.5rem}
.brand{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.5rem}
.brand a{color:var(--text-muted);text-decoration:none}
h1{font-size:1.3rem;font-weight:700;margin-bottom:1.5rem}
.report{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;text-decoration:none;color:var(--text);transition:border-color .15s}
.report:hover{border-color:var(--text)}
.report-title{font-weight:600;font-size:.85rem}
.report-meta{font-size:.72rem;color:var(--text-muted)}
.badge{display:inline-block;padding:.1rem .4rem;border-radius:2px;font-size:.65rem;font-weight:600;background:var(--yellow-bg);color:var(--yellow)}
</style>
</head>
<body>
<div class="container">
    <div class="brand"><a href="../dashboard/">Radar</a> / pessano.it</div>
    <h1>pessano.it &mdash; Report</h1>
    <a href="2026-03-24-categorie-viola-check/" class="report">
        <div>
            <div class="report-title">Verifica categorie e colori</div>
            <div class="report-meta">24 marzo 2026 &middot; Verifica segnalazione</div>
        </div>
        <span class="badge">70/100</span>
    </a>
</div>
</body>
</html>
