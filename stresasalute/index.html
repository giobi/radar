<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — Stresa Salute</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#fafaf9; --surface:#fff; --border:#e5e5e0; --text:#1c1917; --text-secondary:#57534e; --text-muted:#a8a29e; --mono:'IBM Plex Mono',monospace; --radius:3px; --green:#15803d; --yellow:#854d0e; --red:#b91c1c; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--mono);background:var(--bg);color:var(--text);line-height:1.7;font-size:14px}
.container{max-width:1080px;margin:0 auto;padding:0 2.5rem}
.header{background:var(--surface);border-bottom:2px solid var(--text);padding:2rem 0 1.75rem}
.brand{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem}
.brand a{color:var(--text-muted);text-decoration:none}
h1{font-size:1.3rem;font-weight:700;letter-spacing:-.01em}
.reports{padding:2rem 0}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1.5rem;text-decoration:none;color:var(--text);transition:border-color .15s}
.report-card:hover{border-color:var(--text)}
.score{font-size:1.4rem;font-weight:700;min-width:50px;text-align:center}
.report-info{flex:1}
.report-title{font-weight:600;font-size:.85rem;margin-bottom:.2rem}
.report-meta{font-size:.72rem;color:var(--text-muted)}
.footer{text-align:center;padding:3rem 0 2rem;font-size:.65rem;color:var(--text-muted)}
.footer a{color:var(--text-muted);text-decoration:none}
</style>
</head>
<body>
<div class="header">
<div class="container">
    <div class="brand"><a href="../dashboard/">Radar</a></div>
    <h1>Stresa Salute</h1>
</div>
</div>
<div class="container">
<div class="reports">
    <a class="report-card" href="2026-05-07-collaudo-profondo/">
        <span class="score" style="color:var(--yellow)">75</span>
        <div class="report-info">
            <div class="report-title">Collaudo profondo del sito</div>
            <div class="report-meta">7 maggio 2026 &middot; Collaudo generale &middot; 2 errori 404, prenotazioni vuota</div>
        </div>
    </a>
    <a class="report-card" href="2026-04-30-testi-review/">
        <span class="score" style="color:var(--green)">—</span>
        <div class="report-info">
            <div class="report-title">Revisione testi</div>
            <div class="report-meta">30 aprile 2026 &middot; Revisione contenuti</div>
        </div>
    </a>
</div>
<div class="footer">Radar &mdash; <a href="https://giobi.com">giobi.com</a></div>
</div>
</body>
</html>
