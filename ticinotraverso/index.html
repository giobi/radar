<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Radar — Ticino Traverso</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#fafaf9; --surface:#fff; --border:#e5e5e0; --text:#1c1917; --text-sec:#57534e; --text-muted:#a8a29e; --green:#15803d; --mono:'IBM Plex Mono',monospace; --radius:3px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--mono); background:var(--bg); color:var(--text); line-height:1.7; font-size:14px; }
.container { max-width:1080px; margin:0 auto; padding:2rem 2.5rem; }
.brand { font-size:.65rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:.75rem; }
.brand a { color:var(--text-muted); text-decoration:none; }
h1 { font-size:1.2rem; font-weight:700; margin-bottom:.25rem; }
.domain { font-size:.8rem; color:var(--text-sec); margin-bottom:2rem; }
.report { display:block; padding:1rem 1.25rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:.75rem; text-decoration:none; color:var(--text); transition:border-color .15s; }
.report:hover { border-color:var(--text); }
.report-date { font-size:.7rem; color:var(--text-muted); }
.report-title { font-size:.85rem; font-weight:600; margin:.25rem 0; }
.report-score { display:inline-block; padding:.1rem .4rem; background:rgba(21,128,61,.08); color:var(--green); border-radius:2px; font-size:.7rem; font-weight:600; }
</style>
</head>
<body>
<div class="container">
    <div class="brand">📡 <a href="https://radar.giobi.com/dashboard/">RADAR</a></div>
    <h1>Ticino Traverso</h1>
    <div class="domain">ticinotraverso.com</div>
    
    <a class="report" href="2026-03-06-post-translation-check/">
        <div class="report-date">6 marzo 2026</div>
        <div class="report-title">Traduzioni DE/FR + CTA</div>
        <span class="report-score">100/100</span>
    </a>
</div>
</body>
</html>
